name: Build and Package Extension

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: './extension/package-lock.json'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Pillow

    - name: Install Node Dependencies
      run: |
        cd extension
        npm ci

    - name: Compile and Package VSIX
      run: |
        cd extension
        npm run compile
        npx @vscode/vsce package --allow-missing-repository --skip-license

    - name: Update README.md with Release Download Link
      run: |
        # Read version from package.json
        VERSION=$(node -p "require('./extension/package.json').version")
        REPO="${{ github.repository }}"
        echo "Updating README.md with version v$VERSION for repository $REPO"
        
        # Replace the placeholder URL in README.md
        # Placeholder format: https://github.com/YOUR_USERNAME/YOUR_REPO/releases/download/v0.0.1/commitscribe-0.0.1.vsix
        sed -i "s|https://github.com/YOUR_USERNAME/YOUR_REPO/releases/download/v[0-9.]*/commitscribe-[0-9.]*\.vsix|https://github.com/${REPO}/releases/download/v${VERSION}/commitscribe-${VERSION}.vsix|g" README.md
        
        # Also replace older dynamic version links if any to keep them updated
        sed -i "s|https://github.com/${REPO}/releases/download/v[0-9.]*/commitscribe-[0-9.]*\.vsix|https://github.com/${REPO}/releases/download/v${VERSION}/commitscribe-${VERSION}.vsix|g" README.md

    - name: Commit and Push README Updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git diff-index --quiet HEAD || git commit -m "chore: update README.md download link to v$(node -p "require('./extension/package.json').version") [skip ci]" && git push

    - name: Upload VSIX Artifact
      uses: actions/upload-artifact@v4
      with:
        name: commitscribe-vsix
        path: extension/*.vsix
